<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FileBridge Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .file-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .file-card:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased min-h-screen pb-24">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200 px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-md shadow-blue-500/20">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">
                FileBridge</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleView()" id="view-toggle-btn"
                class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 active:scale-95 transition-all">
                <!-- Icon will be set dynamically -->
            </button>
            <button onclick="fetchFiles()"
                class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-blue-600 active:scale-95 transition-all">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Floating Action Button for Upload -->
    <input type="file" id="file-input" multiple class="hidden" onchange="uploadFiles(this)" />
    <button onclick="document.getElementById('file-input').click()"
        class="fixed bottom-8 right-6 w-14 h-14 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30 flex items-center justify-center text-white hover:bg-blue-700 active:scale-90 transition-all z-40 group">
        <svg class="w-7 h-7 group-hover:rotate-90 transition-transform duration-300" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
    </button>

    <main class="max-w-4xl mx-auto px-5 mt-6 pb-20">

        <!-- Files List -->
        <div>
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 px-1">Available Files</h2>

            <div id="loading" class="text-center py-12 hidden">
                <div
                    class="inline-block animate-spin rounded-full h-8 w-8 border-[3px] border-slate-200 border-t-blue-600">
                </div>
                <p class="text-slate-500 mt-3 text-sm font-medium">Scanning folder...</p>
            </div>

            <div id="empty-state" class="text-center py-16 hidden">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                </div>
                <p class="text-slate-700 font-semibold text-lg">Folder is empty</p>
                <p class="text-sm text-slate-400 mt-1">Files shared from PC will appear here</p>
            </div>

            <ul id="file-list" class="space-y-3">
                <!-- dynamic files injected here -->
            </ul>
        </div>
    </main>

    <!-- Upload Progress Toast -->
    <div id="toast"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 transition-all duration-300 translate-y-24 opacity-0 z-50 pointer-events-none">
        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" id="toast-spinner"></div>
        <svg id="toast-check" class="w-5 h-5 text-emerald-400 hidden" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        <span id="toast-message" class="font-medium text-sm">Uploading files...</span>
    </div>

    <script>
        const DOM = {
            list: document.getElementById('file-list'),
            loading: document.getElementById('loading'),
            emptyState: document.getElementById('empty-state'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-message'),
            toastSpinner: document.getElementById('toast-spinner'),
            toastCheck: document.getElementById('toast-check')
        };

        let toastTimeout;
        let currentView = 'grid'; // 'list' or 'grid'
        let cachedFiles = [];

        function toggleView() {
            currentView = currentView === 'list' ? 'grid' : 'list';
            updateToggleIcon();
            renderFiles();
        }

        function updateToggleIcon() {
            const btn = document.getElementById('view-toggle-btn');
            if (currentView === 'list') {
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>`;
            } else {
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>`;
            }
        }

        // Initialize icon
        updateToggleIcon();

        function showToast(message, isLoading = false, type = 'normal') {
            clearTimeout(toastTimeout);
            DOM.toastMsg.textContent = message;

            if (isLoading) {
                DOM.toastSpinner.classList.remove('hidden');
                DOM.toastCheck.classList.add('hidden');
                DOM.toast.classList.remove('bg-rose-500', 'bg-emerald-500');
                DOM.toast.classList.add('bg-slate-800');
            } else {
                DOM.toastSpinner.classList.add('hidden');
                DOM.toastCheck.classList.remove('hidden');

                if (type === 'error') {
                    DOM.toastCheck.classList.add('hidden'); // hide check for error
                    DOM.toast.classList.remove('bg-slate-800', 'bg-emerald-500');
                    DOM.toast.classList.add('bg-rose-500');
                } else {
                    DOM.toast.classList.remove('bg-slate-800', 'bg-rose-500');
                    DOM.toast.classList.add('bg-slate-800'); // keep dark for success too
                }
            }

            DOM.toast.classList.remove('translate-y-24', 'opacity-0');

            if (!isLoading) {
                toastTimeout = setTimeout(() => {
                    hideToast();
                }, 3000);
            }
        }

        function hideToast() {
            DOM.toast.classList.add('translate-y-24', 'opacity-0');
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'heic'];
            const videoExts = ['mp4', 'mov', 'avi', 'mkv', 'webm'];
            const fileUrl = `/files/${encodeURIComponent(filename)}`;

            if (imageExts.includes(ext)) {
                return `<img src="${fileUrl}" class="w-full h-full object-cover" loading="lazy" onerror="this.outerHTML='<svg class=\\'w-6 h-6 text-emerald-500\\' fill=\\'none\\' viewBox=\\'0 0 24 24\\' stroke=\\'currentColor\\'><path stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\' stroke-width=\\'1.5\\' d=\\'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z\\' /></svg>'">`;
            } else if (videoExts.includes(ext)) {
                return `<div class="relative w-full h-full bg-slate-200">
                            <video src="${fileUrl}#t=0.001" class="w-full h-full object-cover" preload="metadata" muted playsinline></video>
                            <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-white drop-shadow" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                            </div>
                        </div>`;
            } else if (ext === 'pdf') {
                return `<canvas data-pdf-src="${fileUrl}" class="pdf-thumbnail w-full h-full object-cover hidden"></canvas>
                        <svg class="pdf-fallback w-6 h-6 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 9h1.5m1.5 0h1.5m-3 4h3m-3 4h3" /></svg>`;
            } else {
                return `<svg class="w-6 h-6 text-blue-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>`;
            }
        }

        async function renderPDFThumbnails() {
            const canvases = document.querySelectorAll('.pdf-thumbnail:not(.rendered)');
            for (const canvas of canvases) {
                canvas.classList.add('rendered');
                const src = canvas.dataset.pdfSrc;
                try {
                    const loadingTask = pdfjsLib.getDocument(src);
                    const pdf = await loadingTask.promise;
                    const page = await pdf.getPage(1);

                    const viewport = page.getViewport({ scale: 0.5 });
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const renderContext = {
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;

                    canvas.classList.remove('hidden');
                    canvas.nextElementSibling.classList.add('hidden'); // Hide the fallback SVG
                } catch (err) {
                    console.error('Error rendering PDF thumbnail:', err);
                }
            }
        }

        async function fetchFiles() {
            DOM.loading.classList.remove('hidden');
            DOM.emptyState.classList.add('hidden');
            DOM.list.innerHTML = '';

            try {
                const response = await fetch('/files');
                const files = await response.json();
                cachedFiles = files.filter(f => !f.is_dir);
                renderFiles();
            } catch (err) {
                DOM.loading.classList.add('hidden');
                DOM.emptyState.classList.remove('hidden');
                console.error('Error fetching files:', err);
            }
        }

        function renderFiles() {
            DOM.loading.classList.add('hidden');
            DOM.list.innerHTML = '';

            if (cachedFiles.length === 0) {
                DOM.emptyState.classList.remove('hidden');
                return;
            } else {
                DOM.emptyState.classList.add('hidden');
            }

            // Set grid/list layout classes
            if (currentView === 'grid') {
                DOM.list.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4';
            } else {
                DOM.list.className = 'space-y-3';
            }

            cachedFiles.forEach(file => {
                const li = document.createElement('li');

                if (currentView === 'list') {
                    li.className = 'file-card bg-white cursor-pointer rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center gap-3 hover:bg-slate-50';
                    li.onclick = () => window.open(`/files/${encodeURIComponent(file.name)}`, '_blank');

                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'w-12 h-12 bg-slate-100 rounded-xl relative overflow-hidden flex items-center justify-center shrink-0';
                    iconDiv.innerHTML = getFileIcon(file.name);

                    const nameContainer = document.createElement('div');
                    nameContainer.className = 'flex-grow min-w-0';
                    const nameSpan = document.createElement('p');
                    nameSpan.className = 'font-medium text-slate-800 text-sm truncate';
                    nameSpan.textContent = file.name;
                    nameContainer.appendChild(nameSpan);

                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'flex items-center gap-1 shrink-0';
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 active:bg-rose-100 transition-colors z-10';
                    deleteBtn.innerHTML = `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteFile(file.name);
                    };
                    actionsDiv.appendChild(deleteBtn);

                    li.appendChild(iconDiv);
                    li.appendChild(nameContainer);
                    li.appendChild(actionsDiv);
                } else {
                    // Grid View Layout
                    li.className = 'file-card bg-white cursor-pointer rounded-2xl shadow-sm border border-slate-100 flex flex-col overflow-hidden relative group hover:shadow-md';
                    li.onclick = () => window.open(`/files/${encodeURIComponent(file.name)}`, '_blank');

                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'w-full aspect-square bg-slate-100 relative overflow-hidden flex items-center justify-center shrink-0 border-b border-slate-50';
                    iconDiv.innerHTML = getFileIcon(file.name);

                    const nameContainer = document.createElement('div');
                    nameContainer.className = 'p-3 w-full flex items-center justify-between';
                    const nameSpan = document.createElement('p');
                    nameSpan.className = 'font-medium text-slate-700 text-sm truncate pr-2';
                    nameSpan.textContent = file.name;
                    nameContainer.appendChild(nameSpan);

                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'absolute top-2 right-2 flex flex-col gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity bg-white/90 backdrop-blur-sm rounded-xl p-1 shadow-sm border border-slate-100/50 z-10';
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'w-8 h-8 rounded-lg flex items-center justify-center text-slate-500 hover:text-rose-600 hover:bg-rose-50 transition-colors';
                    deleteBtn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteFile(file.name);
                    };
                    actionsDiv.appendChild(deleteBtn);

                    li.appendChild(iconDiv);
                    li.appendChild(actionsDiv);
                    li.appendChild(nameContainer);
                }

                DOM.list.appendChild(li);
            });

            // Trigger PDF thumbnail rendering
            renderPDFThumbnails();
        }

        async function uploadFiles(input) {
            const files = input.files;
            if (files.length === 0) return;

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('file', files[i]);
            }

            showToast(`Uploading ${files.length} file${files.length > 1 ? 's' : ''}...`, true);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    input.value = '';
                    showToast('Upload complete!', false);
                    fetchFiles();
                } else {
                    showToast('Upload failed', false, 'error');
                }
            } catch (err) {
                console.error('Upload error:', err);
                showToast('Upload error', false, 'error');
            }
        }

        async function deleteFile(name) {
            if (!confirm(`Delete "${name}" from your PC?`)) return;

            showToast('Deleting...', true);

            try {
                const response = await fetch(`/files/${encodeURIComponent(name)}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('Deleted item', false);
                    fetchFiles();
                } else {
                    showToast('Delete failed', false, 'error');
                }
            } catch (err) {
                console.error('Delete error:', err);
                showToast('Delete error', false, 'error');
            }
        }

        fetchFiles();
    </script>
</body>

</html>
